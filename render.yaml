services:
  - type: web
    name: theo-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected by Render automatically — do NOT set it here.
      # All secrets below: set values in the Render dashboard (sync:false),
      # do NOT commit real values to git.
      - key: DATABASE_URL
        sync: false
      - key: BCRYPT_SALT_ROUNDS
        value: "10"
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SERVICE
        sync: false
      - key: SMTP_MAIL
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_NAME
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET_NAME
        sync: false
      - key: CLOUDFRONT_URL
        sync: false
      - key: ONESIGNAL_APP_ID
        sync: false
      - key: ONESIGNAL_REST_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: PLATFORM_FEE_PERCENT
        value: "5"
      - key: PLATFORM_CURRENCY
        value: usd
      - key: STRIPE_CONNECT_RETURN_URL
        sync: false
      - key: STRIPE_CONNECT_REFRESH_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
